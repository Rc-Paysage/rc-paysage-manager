.stb2{display:flex;gap:6px;margin-top:10px}

  tab:"dashboard",ao:"hashtags",pt:"vues",px:null,

function fmt(n){if(n>=1000000)return(n/1000000).toFixed(1)+"M";if(n>=1000)return(n/1000).toFixed(1)+"K";return""+n}
function sc2(s){if(s>=85)return["#E1F5EE","#1D9E75"];if(s>=65)return["#FAEEDA","#BA7517"];return["#FCEBEB","#A32D2D"]}
function tb(t){const m={IMAGE:["#F1EFE8","#5F5E5A","Photo"],CAROUSEL_ALBUM:["#E6F1FB","#185FA5","Carrousel"],VIDEO:["#FBEAF0","#993556","Vidéo"],REELS:["#FBEAF0","#993556","Reel"]};const[bg,c,l]=m[t]||["#F1EFE8","#5F5E5A",t];return`<span class="tb" style="background:${bg};color:${c}">${l}</span>`}

function render(){
  document.querySelectorAll(".nb").forEach(b=>b.classList.toggle("active",b.dataset.t===S.tab));
  document.getElementById("app").innerHTML=pages[S.tab]();
  bind();
}

function bind(){
  document.querySelectorAll(".nb").forEach(b=>b.onclick=()=>{S.tab=b.dataset.t;render()});
  document.querySelectorAll(".stab").forEach(b=>b.onclick=()=>{
    if(b.dataset.g==="ao")S.ao=b.dataset.v;
    if(b.dataset.g==="pt")S.pt=b.dataset.v;
    render();
  });
  document.querySelectorAll(".xbtn").forEach(b=>b.onclick=()=>{S.px=S.px===+b.dataset.id?null:+b.dataset.id;render()});
  document.querySelectorAll(".stbtn").forEach(b=>b.onclick=()=>{
    const id=+b.dataset.id,st=b.dataset.s;
    S.conseils=S.conseils.map(c=>c.id===id?{...c,st}:c);render();
  });
  document.querySelectorAll(".ctog").forEach(b=>b.onclick=()=>{
    const v=b.dataset.v;
    S.ac=S.ac.includes(v)?S.ac.filter(x=>x!==v):[...S.ac,v];render();
  });
  document.querySelectorAll(".sty").forEach(b=>b.onclick=()=>{S.astyle=b.dataset.s;render()});
  const gb=document.getElementById("genbtn");
  if(gb)gb.onclick=async()=>{
    if(!S.ac.length)return;
    S.loading.agent=true;render();
    const sd={rcpaysage:"Style RC-Paysage : direct, luxe sobre, professionnel, ancré territoire.",mosiman:"Style Mosiman (billet France Inter) : poétique, phrases courtes suspendues, répétitions rythmiques (Il y a des lieux..., Il y a un moment...), mélancolie douce, ellipses, très musical.",hybride:"Style hybride : rythme poétique Mosiman + ancrage concret RC-Paysage (lieu, matière, projet, territoire)."};
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._akey||"","anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1200,messages:[{role:"user",content:`Tu es community manager pour RC-Paysage (@romaincouteaux), paysagiste DPLG Drôme/Provence. 19465 abonnés. Contenu dispo: ${S.ac.join(", ")}. ${sd[S.astyle]} Génère: 1.TITRE majuscules 2-4 mots 2.FORMAT+justification 3.LÉGENDE complète prête à publier 4.8 hashtags parmi #luxurygarden #mediterraneangarden #landscapedesign #jardinsexception #paysagedexception #provence #luxurylandscape #landscapearchitecture #paysagistesignature #outdoorlifestyle #mediterraneandesign #jardindeprovence 5.MEILLEUR MOMENT 6.SCORE/100+justification. En français.`}]})});
      const d=await r.json();
      S.brief=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"Erreur API";
    }catch(e){S.brief="Agent IA non disponible (clé API manquante).";}
    S.briefEdit=S.brief;S.editing=false;S.loading.agent=false;render();
  };
  const eb=document.getElementById("editbtn");
  if(eb)eb.onclick=()=>{S.editing=true;render()};
  const ta=document.getElementById("brieftxt");
  if(ta)ta.oninput=()=>{S.briefEdit=ta.value};
  const vb=document.getElementById("valbtn");
  if(vb)vb.onclick=()=>{
    S.validated.unshift({date:new Date().toLocaleDateString("fr-FR"),contenu:S.ac.join(", "),style:S.astyle,brief:S.editing?S.briefEdit:S.brief});
    S.brief="";S.briefEdit="";S.editing=false;S.ac=[];render();
  };
  document.querySelectorAll(".rgbtn").forEach(b=>b.onclick=async()=>{
    const part=b.dataset.p;b.textContent="…";
    const pp={titre:`Génère uniquement un TITRE (2-4 mots majuscules) pour RC-Paysage. Contenu: ${S.ac.join(", ")}. Style ${S.astyle}. Titre seul.`,legende:`Génère uniquement une LÉGENDE Instagram pour RC-Paysage. Contenu: ${S.ac.join(", ")}. Style: ${{rcpaysage:"RC-Paysage direct luxe",mosiman:"poétique Mosiman France Inter",hybride:"hybride Mosiman+RC-Paysage"}[S.astyle]}. Légende seule prête à publier.`,hashtags:`Génère 8 hashtags pour RC-Paysage parmi: #luxurygarden #mediterraneangarden #landscapedesign #jardinsexception #paysagedexception #provence #luxurylandscape #landscapearchitecture #paysagistesignature #outdoorlifestyle #mediterraneandesign #jardindeprovence. Contenu: ${S.ac.join(", ")}. Hashtags seuls.`};
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._akey||"","anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content:pp[part]}]})});
      const d=await r.json();
      const txt=d.content?.filter(x=>x.type==="text").map(x=>x.text).join("")||"";
      S.briefEdit+="\n\n--- "+part.toUpperCase()+" ---\n"+txt;
      if(document.getElementById("brieftxt"))document.getElementById("brieftxt").value=S.briefEdit;
    }catch(e){}
    b.textContent="↻ "+part;
  });
  document.querySelectorAll(".acabtn").forEach(b=>b.onclick=async()=>{
    const h=b.dataset.h;S.loading[h]=true;render();
    try{
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json","x-api-key":window._akey||"","anthropic-version":"2023-06-01"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,messages:[{role:"user",content:`Expert stratégie Instagram luxe. Analyse ${h} pour RC-Paysage (@romaincouteaux, paysagiste DPLG, 19465 abonnés, Drôme/Provence). 4 points: 1.Ce qu'ils font mieux (2-3 lignes) 2.Ce que RC-Paysage fait mieux (2-3 lignes) 3.Opportunité concrète (2 lignes) 4.Conseil actionnable immédiat (1-2 lignes). Direct, expert, français.`}]})});
      const d=await r.json();
      S.canal[h]=d.content?.filter(b=>b.type==="text").map(b=>b.text).join("")||"";
    }catch(e){S.canal[h]="Agent IA non disponible.";}
    S.loading[h]=false;render();
  });
  const addb=document.getElementById("addbtn");
  if(addb)addb.onclick=()=>{
    const inp=document.getElementById("cinp");
    const h=inp.value.trim().replace(/^@/,"");
    if(h&&!S.ccustom.includes("@"+h))S.ccustom.push("@"+h);
    inp.value="";render();
  };
}

</div>
<div class="g2">
  ${[{l:"Vues (90j)",v:"706,7K",s:"22,5% followers · 77,5% non-followers",i:"ti-eye",c:"var(--purple)"},{l:"Interactions",v:"43,9K",s:"18,8% followers · 81,2% non-followers",i:"ti-heart",c:"var(--pink)"},{l:"Comptes touchés",v:"268,5K",s:"Sur 90 jours",i:"ti-users",c:"var(--blue)"},{l:"Visites profil",v:"13,5K",s:"287 clics lien bio",i:"ti-user",c:"var(--green)"}].map(x=>`<div class="stc"><i class="ti ${x.i}" style="font-size:16px;color:${x.c};margin-bottom:6px;display:block"></i><div class="sv">${x.v}</div><div class="sl">${x.l}</div><div class="ss">${x.s}</div></div>`).join("")}
</div>
<div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:12px">Vues par type de contenu (90j)</div>
  ${[{l:"Publications",v:582000,c:"var(--purple)"},{l:"Reels",v:37000,c:"var(--pink)"},{l:"Stories",v:10000,c:"var(--blue)"}].map(x=>`<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:12px;color:var(--t2);margin-bottom:3px"><span>${x.l}</span><span style="font-weight:500">${fmt(x.v)}</span></div>${bar(x.v,582000,x.c)}</div>`).join("")}
  <div class="ia">⚠️ <strong>Insight :</strong> Vos publications génèrent 15x plus de vues que vos Reels. Potentiel Reels sous-exploité.</div>
</div>
<div class="card">
  <div style="font-size:13px;font-weight:700;margin-bottom:10px">Croissance — nouveaux vs perdus</div>
  <div style="display:flex;gap:10px">
    <div style="flex:1;background:#E1F5EE;border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--green)">+${D.newF.toLocaleString("fr-FR")}</div><div style="font-size:11px;color:#085041">Nouveaux abonnés</div></div>
    <div style="flex:1;background:#FCEBEB;border-radius:8px;padding:10px;text-align:center"><div style="font-size:20px;font-weight:700;color:var(--red)">-${D.unF}</div><div style="font-size:11px;color:#7A1F1F">Arrêts de suivi</div></div>
  </div>
  <div style="font-size:12px;color:var(--t3);margin-top:8px">Taux de rétention : ${((1-D.unF/D.newF)*100).toFixed(1)}% — excellent.</div>
</div>`,

posts:()=>{
  const s=[...D.posts].sort((a,b)=>b[S.pt]-a[S.pt]);
  return`<div class="stabs">${[["vues","👁 Vues"],["lk","❤️ Likes"],["sh","↗ Partages"],["sv","🔖 Enreg."],["sc","⭐ Score"]].map(([k,l])=>`<button class="stab${S.pt===k?" active":""}" data-g="pt" data-v="${k}">${l}</button>`).join("")}</div>
<div style="font-size:11px;color:var(--t3);margin-bottom:12px">${D.posts.length} publications · triées par ${S.pt}</div>
${s.map(p=>{const ex=S.px===p.id;return`<div class="card"><div class="pc"><div class="pt">${p.th}</div><div style="flex:1;min-width:0">
<div style="display:flex;justify-content:space-between;margin-bottom:4px;gap:6px"><div>${tb(p.type)} <span style="font-size:11px;color:var(--t3);margin-left:6px">${p.age}</span></div>${sbdg(p.sc)}</div>
<div style="font-size:13px;font-weight:700;margin-bottom:4px">${p.titre}</div>
<div style="font-size:12px;color:var(--t2);line-height:1.4;margin-bottom:6px">${ex?p.cap:p.cap.slice(0,80)+(p.cap.length>80?"…":"")}${p.cap.length>80?`<button class="xbtn" data-id="${p.id}" style="background:none;border:none;color:var(--purple);font-size:11px;cursor:pointer;padding:0 4px">${ex?"Moins":"Plus"}</button>`:""}</div>
<div class="ps"><span style="color:var(--purple)"><i class="ti ti-eye"></i> ${fmt(p.vues)}</span><span style="color:var(--pink)"><i class="ti ti-heart"></i> ${fmt(p.lk)}</span><span style="color:var(--blue)"><i class="ti ti-message"></i> ${p.cm}</span><span style="color:var(--green)"><i class="ti ti-share"></i> ${p.sh}</span><span style="color:var(--amber)"><i class="ti ti-bookmark"></i> ${fmt(p.sv)}</span></div>
</div></div></div>`}).join("")}`;
},

analyse:()=>{
  const o=S.ao;
  let c="";
  if(o==="hashtags")c=`<div class="ib">📌 <strong>Source :</strong> Vos hashtags réels, scorés selon performances de vos posts (vues, partages, enregistrements).</div>${D.hashtags.map(h=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700;color:var(--purple)">${h.tag}</span>${sbdg(h.sc)}</div><div style="font-size:12px;color:var(--t2);line-height:1.5">${h.r}</div><div style="margin-top:6px">${bar(h.sc,100,"var(--purple)",4)}</div></div>`).join("")}`;
  if(o==="horaires")c=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:4px">Meilleurs créneaux Instagram</div><div style="font-size:11px;color:var(--t3);margin-bottom:12px">Source : données réelles "Heures auxquelles vos followers sont actifs"</div>${[{j:"Dimanche",h:"18h – 23h"},{j:"Lundi",h:"18h – 21h"}].map(m=>`<div style="display:flex;justify-content:space-between;padding:10px 12px;background:#E1F5EE;border-radius:8px;margin-bottom:8px"><span style="font-weight:700;color:#085041">${m.j}</span><span style="color:var(--green);font-weight:600">${m.h}</span></div>`).join("")}<div class="ia">⚠️ Vous publiez souvent à 16h45 — vos followers sont actifs à partir de 18h. Décaler d'1h30 pourrait augmenter l'engagement de 20-30%.</div></div>
  <div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:12px">Activité par jour</div>${[{j:"Dimanche",a:95,b:true},{j:"Lundi",a:88,b:true},{j:"Samedi",a:82},{j:"Vendredi",a:78},{j:"Mercredi",a:75},{j:"Mardi",a:72},{j:"Jeudi",a:70}].map(d=>`<div style="display:flex;align-items:center;gap:10px;margin-bottom:10px"><div style="width:72px;font-size:12px;color:${d.b?"var(--purple)":"var(--t2)"};font-weight:${d.b?700:400}">${d.j}</div><div style="flex:1">${bar(d.a,100,d.b?"var(--purple)":"#B0ACDE",8)}</div>${d.b?`<span style="font-size:10px;background:#EEEDFE;color:var(--purple);padding:2px 6px;border-radius:4px">⭐ Optimal</span>`:""}</div>`).join("")}</div>`;
  if(o==="formats")c=`<div class="ib">📊 <strong>Source :</strong> Analyse de vos ${D.posts.length} publications avec données réelles.</div>${[{t:"Publications",v:"582K",i:"Format dominant — 93% de vos vues. Titres en MAJUSCULES génèrent jusqu'à 171K vues. Pattern à systématiser.",c:"var(--purple)"},{t:"Reels",v:"37K",i:"Sous-exploité mais fort potentiel d'acquisition non-followers. Objectif : 1 Reel/semaine.",c:"var(--pink)"},{t:"Stories",v:"10K",i:"Usage minimal. Les stories fidélisent les abonnés et améliorent votre score algorithmique.",c:"var(--blue)"}].map(f=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><span style="font-size:13px;font-weight:700">${f.t}</span><span style="color:${f.c};font-weight:600">${f.v} vues</span></div><div style="font-size:12px;color:var(--t2);line-height:1.5">${f.i}</div></div>`).join("")}`;
  if(o==="audience")c=`<div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Genre</div>${D.audience.genres.map(g=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${g.l}</span><span style="font-weight:600">${g.p}%</span></div>${bar(g.p,100,g.l==="Hommes"?"var(--blue)":"var(--pink)")}</div>`).join("")}<div style="font-size:11px;color:var(--t3);margin-top:6px">Majorité masculine (55,9%) — cohérent avec propriétaires de domaines et prescripteurs architectes.</div></div>
  <div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Tranches d'âge</div>${D.audience.ages.map(a=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${a.l}</span><span style="font-weight:600">${a.p}%</span></div>${bar(a.p,34.1,"var(--purple)")}</div>`).join("")}<div style="font-size:11px;color:var(--t3);margin-top:6px">Cœur de cible 35–54 ans (60,5%) — parfaitement aligné avec votre clientèle.</div></div>
  <div class="card"><div style="font-size:13px;font-weight:700;margin-bottom:10px">Pays</div>${D.audience.pays.map(p=>`<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px"><span>${p.l}</span><span style="font-weight:600">${p.p}%</span></div>${bar(p.p,41,"var(--green)")}</div>`).join("")}<div style="font-size:11px;color:var(--t3);margin-top:6px">59% d'audience internationale — potentiel clientèle étrangère cherchant propriétés en Provence.</div></div>`;
  return`<div class="stabs">${[["hashtags","#️⃣ Hashtags"],["horaires","🕐 Horaires"],["formats","📊 Formats"],["audience","👥 Audience"]].map(([k,l])=>`<button class="stab${S.ao===k?" active":""}" data-g="ao" data-v="${k}">${l}</button>`).join("")}</div>${c}`;
},

concurrence:()=>{
  const all=[...D.competitors,...S.ccustom.map(h=>({h,type:"Ajouté",f:"?",n:"Cliquez Analyser pour une analyse IA.",plus:"—",moins:"—"}))];
  return`<div class="ib" style="margin-bottom:12px">ℹ️ Comptes sélectionnés par vous — concurrents, prescripteurs et références. L'analyse IA compare chaque compte avec votre positionnement.</div>
<div style="display:flex;gap:8px;margin-bottom:14px"><input id="cinp" placeholder="Ajouter un compte @..." style="flex:1;font-size:13px;padding:8px 12px;border-radius:8px;border:0.5px solid var(--border);background:var(--bg2);color:var(--t1)"/><button id="addbtn" class="bp" style="font-size:12px;padding:8px 14px">+ Ajouter</button></div>
${all.map(c=>`<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:6px"><div><span style="font-weight:700;font-size:14px;color:var(--purple)">${c.h}</span> <span style="font-size:11px;color:var(--t3)">${c.type} · ${c.f}</span></div><button class="acabtn bsm" data-h="${c.h}" style="color:var(--purple)">Analyser IA</button></div><div style="font-size:12px;color:var(--t2);margin-bottom:8px">${c.n}</div><div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px"><span style="background:#E1F5EE;color:#085041;padding:2px 8px;border-radius:4px">✓ ${c.plus}</span><span style="background:#FCEBEB;color:#7A1F1F;padding:2px 8px;border-radius:4px">✗ ${c.moins}</span></div>${S.loading[c.h]?`<div class="ld">Analyse en cours…</div>`:S.canal[c.h]?`<div style="margin-top:10px;padding:10px 12px;background:var(--bg2);border-radius:8px;font-size:12px;color:var(--t2);line-height:1.6;white-space:pre-wrap">${S.canal[c.h]}</div>`:""}</div>`).join("")}`;
},

optim:()=>{
  const sl={"en-cours":["#FAEEDA","#633806","En cours"],"validé":["#E1F5EE","#085041","✓ Validé"],"passé":["#F1EFE8","#888780","→ Passé"]};
  const rc=list=>list.map(c=>`<div class="cc ${c.st}" style="border-color:${c.st==="validé"?"var(--green)":"var(--border)"}"><div style="display:flex;justify-content:space-between;gap:8px;margin-bottom:6px"><span style="font-size:13px;font-weight:700;flex:1">${c.titre}</span><div style="display:flex;gap:4px"><span style="font-size:10px;background:#EEEDFE;color:var(--purple);padding:2px 6px;border-radius:4px">+${c.impact}</span><span style="font-size:10px;background:var(--bg2);color:var(--t3);padding:2px 6px;border-radius:4px">${c.ease}</span></div></div><div style="font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px">${c.detail}</div><div class="stb2">${Object.entries(sl).map(([s,[bg,col,lab]])=>`<button class="stbtn" data-id="${c.id}" data-s="${s}" style="font-size:11px;padding:4px 10px;border-radius:6px;border:0.5px solid var(--border);background:${c.st===s?bg:"var(--bg2)"};color:${c.st===s?col:"var(--t2)"};font-weight:${c.st===s?700:400}">${lab}</button>`).join("")}</div></div>`).join("");
  return`<div class="g2" style="margin-bottom:16px">${[["post","📝 Publications"],["feed","🖼 Feed & Stratégie"]].map(([k,l])=>`<div class="stc" style="text-align:center"><div style="font-size:12px;font-weight:600">${l}</div><div style="font-size:11px;color:var(--t3);margin-top:4px">${S.conseils.filter(c=>c.cat===k&&c.st==="validé").length}/${S.conseils.filter(c=>c.cat===k).length} validés</div></div>`).join("")}</div>
<div class="stt">📝 publications</div>${rc(S.conseils.filter(c=>c.cat==="post"))}
<div class="stt">🖼 feed & stratégie</div>${rc(S.conseils.filter(c=>c.cat==="feed"))}`;
},

agent:()=>{
  const opts=["Photos de réalisation","Vidéo terrain","Rendu 3D","Image IA promptée","Carrousel Photoshop","Vidéo 3D animation","Before/After","Détail végétal/matériau"];
  const stys=[["rcpaysage","🏡 RC-Paysage","Direct, ancré territoire, luxe sobre"],["mosiman","🎵 Style Mosiman","Poétique, rythmique, suspendu — France Inter"],["hybride","✨ Hybride","Rythme Mosiman + ancrage RC-Paysage"]];
  const hb=!!S.brief;
  return`<div style="font-size:13px;font-weight:700;margin-bottom:10px">Contenu disponible cette semaine</div>
<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">${opts.map(o=>`<button class="ctog" data-v="${o}" style="font-size:12px;padding:6px 12px;border-radius:20px;border:1.5px solid ${S.ac.includes(o)?"var(--purple)":"var(--border)"};background:${S.ac.includes(o)?"#EEEDFE":"var(--bg2)"};color:${S.ac.includes(o)?"var(--purple)":"var(--t2)"};font-weight:${S.ac.includes(o)?700:400}">${S.ac.includes(o)?"✓ ":""}${o}</button>`).join("")}</div>
<div style="font-size:13px;font-weight:700;margin-bottom:10px">Style de rédaction</div>
<div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">${stys.map(([s,l,d])=>`<button class="sty" data-s="${s}" style="text-align:left;padding:10px 14px;border-radius:10px;border:1.5px solid ${S.astyle===s?"var(--purple)":"var(--border)"};background:${S.astyle===s?"#EEEDFE":"var(--bg2)"}"><div style="font-size:13px;font-weight:${S.astyle===s?700:500};color:${S.astyle===s?"var(--purple)":"var(--t1)"}">${l}</div><div style="font-size:11px;color:var(--t3);margin-top:2px">${d}</div></button>`).join("")}</div>
<button id="genbtn" class="bp" style="width:100%;padding:12px;border-radius:10px;opacity:${S.ac.length===0?0.4:1}">${S.loading.agent?"Génération en cours…":hb?"Regénérer le brief ↗":"Générer le brief de publication ↗"}</button>
${hb?`<div class="card" style="margin-top:16px;border-color:var(--purple)"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px"><div style="font-size:12px;font-weight:600;color:var(--purple)">Brief · ${S.ac.join(", ")}</div>${!S.editing?`<button id="editbtn" class="bsm" style="color:var(--purple)">✏️ Modifier</button>`:""}</div>${S.editing?`<textarea id="brieftxt" class="be">${S.briefEdit}</textarea><div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:10px"><span style="font-size:11px;color:var(--t3);padding-top:4px">Regénérer :</span>${[["titre","↻ Titre"],["legende","↻ Légende"],["hashtags","↻ Hashtags"]].map(([p,l])=>`<button class="rgbtn bsm" data-p="${p}">${l}</button>`).join("")}</div>`:`<div style="font-size:13px;color:var(--t2);line-height:1.7;white-space:pre-wrap">${S.brief}</div>`}<div style="display:flex;gap:8px;margin-top:14px"><button id="valbtn" class="bsu" style="flex:1;padding:10px">✓ Valider et sauvegarder</button><button id="genbtn" class="bs" style="padding:10px">↻ Regénérer</button></div></div>`:""}
${S.validated.length?`<div class="stt" style="margin-top:20px">✓ Briefs validés (${S.validated.length})</div>${S.validated.map(b=>`<div class="card2"><div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px"><span style="font-weight:600">${b.contenu}</span><span style="color:var(--t3)">${b.date}</span></div><div style="font-size:11px;color:var(--purple);margin-bottom:6px">${stys.find(s=>s[0]===b.style)[1]}</div><div style="font-size:12px;color:var(--t2);line-height:1.5;max-height:80px;overflow:hidden">${b.brief.slice(0,200)}…</div></div>`).join("")}`:""}`;
},

cal:()=>`
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:14px;font-weight:700">Mai 2026</div><div style="font-size:11px;color:var(--t3)">Objectif : 3 posts/semaine</div></div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">${["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map(d=>`<div style="font-size:11px;color:var(--t3);text-align:center;padding:3px 0">${d}</div>`).join("")}</div>
<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${[...Array(3)].map(()=>"<div></div>").join("")}${[...Array(31)].map((_,i)=>{const d=i+1;const p={19:{l:"Aujourd'hui",c:"#378ADD"},25:{l:"Dim 18h",c:"#1D9E75"},26:{l:"Lun 18h",c:"#1D9E75"},29:{l:"Reel",c:"#D4537E"}}[d];const t=d===19;return`<div style="border-radius:6px;padding:4px 3px;min-height:44px;background:${t?"#E6F1FB":p?"var(--bg2)":"transparent"};border:0.5px solid ${t?"var(--blue)":"var(--border)"}"><div style="font-size:11px;color:${t?"var(--blue)":"var(--t2)"};text-align:center;font-weight:${t?700:400}">${d}</div>${p?`<div style="font-size:8px;color:${p.c};text-align:center;margin-top:2px">${p.l}</div>`:""}</div>`}).join("")}</div>
<div class="ig" style="margin-top:14px"><strong>Rappel :</strong> Meilleurs jours = Dimanche & Lundi · Heure = 18h–21h · Décaler vos publications de 16h45 à 18h.</div>`
};

render();
</script>
</body>
