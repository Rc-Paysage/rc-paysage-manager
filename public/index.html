<html lang="fr">
<head>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #ffffff; --bg2: #f5f5f3; --bg3: #eeede9;
      --text1: #1a1a1a; --text2: #555; --text3: #999;
      --border: #e0ddd6; --purple: #534AB7; --green: #1D9E75;
      --red: #A32D2D; --blue: #185FA5; --amber: #BA7517; --pink: #D4537E;
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: var(--bg); color: var(--text1); max-width: 720px; margin: 0 auto; padding: 16px; }
    button { cursor: pointer; font-family: inherit; }
    input, textarea { font-family: inherit; }

    /* NAV */
    .nav { display: flex; gap: 2px; border-bottom: 1px solid var(--border); margin-bottom: 20px; overflow-x: auto; padding-bottom: 0; }
    .nav-btn { background: none; border: none; border-bottom: 2px solid transparent; color: var(--text2); font-size: 11px; padding: 8px 8px; white-space: nowrap; display: flex; align-items: center; gap: 4px; transition: color .15s; }
    .nav-btn.active { border-bottom-color: var(--purple); color: var(--purple); font-weight: 600; }
    .nav-btn i { font-size: 13px; }

    /* HEADER */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 18px; }
    .avatar { width: 38px; height: 38px; border-radius: 8px; background: #EEEDFE; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: var(--purple); flex-shrink: 0; }
    .badge { margin-left: auto; font-size: 11px; background: #E1F5EE; color: #085041; padding: 3px 10px; border-radius: 6px; font-weight: 500; }

    /* CARDS */
    .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: 12px; padding: 14px 16px; margin-bottom: 12px; }
    .card-bg { background: var(--bg2); border-radius: 10px; padding: 12px 14px; margin-bottom: 10px; }
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
    .stat-card { background: var(--bg2); border-radius: 10px; padding: 12px 14px; }
    .stat-val { font-size: 20px; font-weight: 700; color: var(--text1); }
    .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; }
    .stat-sub { font-size: 10px; color: var(--text3); margin-top: 1px; }

    /* BADGES */
    .type-badge { font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 5px; }
    .score-badge { font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }

    /* BAR */
    .bar-wrap { height: 6px; background: var(--bg3); border-radius: 4px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 4px; }

    /* TABS */
    .sub-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
    .sub-tab { font-size: 12px; padding: 5px 12px; border-radius: 20px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); transition: all .15s; }
    .sub-tab.active { background: var(--purple); color: white; border-color: var(--purple); }

    /* POST CARD */
    .post-card { display: flex; gap: 12px; }
    .post-thumb { width: 56px; height: 56px; border-radius: 8px; background: var(--bg2); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 22px; }
    .post-stats { display: flex; gap: 12px; flex-wrap: wrap; font-size: 12px; color: var(--text2); }
    .post-stats span { display: flex; align-items: center; gap: 3px; }

    /* BRIEF EDITOR */
    .brief-editor { width: 100%; min-height: 180px; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 13px; line-height: 1.6; color: var(--text1); background: var(--bg2); resize: vertical; }
    .brief-editor:focus { outline: none; border-color: var(--purple); }

    /* BUTTONS */
    .btn-primary { background: var(--purple); color: white; border: none; border-radius: 8px; padding: 10px 18px; font-size: 13px; font-weight: 500; }
    .btn-secondary { background: var(--bg2); color: var(--text2); border: 0.5px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 12px; }
    .btn-success { background: #E1F5EE; color: #085041; border: none; border-radius: 8px; padding: 8px 14px; font-size: 12px; font-weight: 500; }
    .btn-small { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 0.5px solid var(--border); background: var(--bg2); color: var(--text2); }
    .btn-small.active { background: #EEEDFE; color: var(--purple); border-color: var(--purple); font-weight: 500; }

    /* INSIGHT BOX */
    .insight-amber { background: #FAEEDA; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #633806; margin-top: 10px; }
    .insight-blue { background: #E6F1FB; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #185FA5; margin-bottom: 12px; }
    .insight-green { background: #E1F5EE; border-radius: 8px; padding: 8px 12px; font-size: 12px; color: #085041; }

    /* OPTIMISATION */
    .conseil-card { border: 0.5px solid var(--border); border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
    .conseil-card.validé { border-color: var(--green); }
    .conseil-card.passé { opacity: 0.5; }
    .statut-btns { display: flex; gap: 6px; margin-top: 10px; }

    /* LOADING */
    .loading { color: var(--text3); font-size: 13px; padding: 20px 0; text-align: center; }

    /* SECTION TITLE */
    .section-title { font-size: 11px; font-weight: 700; color: var(--text3); letter-spacing: .5px; margin: 16px 0 8px; text-transform: uppercase; }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .grid2 { grid-template-columns: 1fr 1fr; gap: 8px; }
    }
  </style>
</head>

// ── UTILS ─────────────────────────────────────────────────────────────────
function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + "M";
  if (n >= 1000) return (n/1000).toFixed(1) + "K";
  return String(n);
}

function scoreColor(s) {
  if (s >= 85) return ["#E1F5EE","#1D9E75"];
  if (s >= 65) return ["#FAEEDA","#BA7517"];
  return ["#FCEBEB","#A32D2D"];
}

function typeBadge(type) {
  const m = { IMAGE:["#F1EFE8","#5F5E5A","Photo"], CAROUSEL_ALBUM:["#E6F1FB","#185FA5","Carrousel"], VIDEO:["#FBEAF0","#993556","Vidéo"], REELS:["#FBEAF0","#993556","Reel"] };
  const [bg,c,l] = m[type] || ["#F1EFE8","#5F5E5A",type];
  return `<span class="type-badge" style="background:${bg};color:${c}">${l}</span>`;
}

function bar(val, max, color="#534AB7", h=6) {
  const pct = Math.min(100, (val/max)*100);
  return `<div class="bar-wrap" style="height:${h}px"><div class="bar-fill" style="width:${pct}%;background:${color}"></div></div>`;
}

function scoreBadge(s) {
  const [bg,c] = scoreColor(s);
  return `<span class="score-badge" style="background:${bg};color:${c}">${s}/100</span>`;
}

async function callClaude(prompt) {
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST",
    headers:{ "Content-Type":"application/json", "x-api-key": ANTHROPIC_KEY, "anthropic-version":"2023-06-01" },
    body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1200, messages:[{ role:"user", content:prompt }] })
  });
  const d = await r.json();
  return d.content?.filter(b=>b.type==="text").map(b=>b.text).join("") || "";
}

async function fetchIG(endpoint) {
  const r = await fetch(`${API}?endpoint=${endpoint}`);
  return r.json();
}

      hashtags: `Génère 8 hashtags optimaux pour RC-Paysage parmi : #luxurygarden #mediterraneangarden #landscapedesign #jardinsexception #paysagedexception #provence #luxurylandscape #landscapearchitecture #paysagistesignature #outdoorlifestyle #mediterraneandesign #jardindeprovence. Contenu : ${state.agentContenu.join(", ")}. Réponds avec les hashtags uniquement.`,
    };
    const result = await callClaude(prompts[part]);
    state.agentBriefEdit += "\n\n--- NOUVELLE VERSION " + part.toUpperCase() + " ---\n" + result;
    if (document.getElementById("agent-textarea")) document.getElementById("agent-textarea").value = state.agentBriefEdit;
    b.textContent = "↻ " + part;
  });
  // agent valider
  const valBtn = document.getElementById("agent-val-btn");
  if (valBtn) valBtn.onclick = () => {
    const final = state.agentEditing ? state.agentBriefEdit : state.agentBrief;
    state.agentValidated.unshift({ date: new Date().toLocaleDateString("fr-FR"), contenu: state.agentContenu.join(", "), style: state.agentStyle, brief: final });
    state.agentBrief = ""; state.agentBriefEdit = ""; state.agentEditing = false; state.agentContenu = [];
    render();
  };
  // concurrence analyse
  document.querySelectorAll(".analyse-concurrent-btn").forEach(b => b.onclick = async () => {
    const h = b.dataset.h;
    state.loading[h] = true; render();
    const result = await callClaude(`Tu es expert stratégie Instagram luxe. Analyse le compte ${h} pour RC-Paysage (@romaincouteaux, paysagiste DPLG, 19 465 abonnés, Drôme/Provence, posts les plus viraux : titres majuscules + jardins luxe provençaux).

4 points :
1. Ce qu'ils font mieux que RC-Paysage (2-3 lignes)
2. Ce que RC-Paysage fait mieux (2-3 lignes)
3. Opportunité concrète de collaboration ou différenciation (2 lignes)
4. Conseil actionnable immédiat pour RC-Paysage (1-2 lignes)

Direct, expert, sans rembourrage. Français.`);
    state.concurrenceAnalyses[h] = result;
    state.loading[h] = false; render();
  });
  // add custom competitor
  const addBtn = document.getElementById("add-concurrent-btn");
  if (addBtn) addBtn.onclick = () => {
    const inp = document.getElementById("custom-concurrent-input");
    const h = inp.value.trim().replace(/^@/,"");
    if (h && !state.concurrenceCustom.includes("@"+h)) state.concurrenceCustom.push("@"+h);
    inp.value = "";
    render();
  };
}

             <span style="font-size:11px;color:var(--text3);padding-top:4px">Regénérer :</span>
             ${[["titre","↻ Titre"],["legende","↻ Légende"],["hashtags","↻ Hashtags"]].map(([p,l])=>`<button class="regen-part btn-small" data-part="${p}">${l}</button>`).join("")}
           </div>`
        : `<div style="font-size:13px;color:var(--text2);line-height:1.7;white-space:pre-wrap">${briefContent}</div>`
      }

      <div style="display:flex;gap:8px;margin-top:14px">
        <button id="agent-val-btn" class="btn-success" style="flex:1;padding:10px">✓ Valider et sauvegarder</button>
        <button id="agent-gen-btn" class="btn-secondary" style="padding:10px">↻ Regénérer</button>
      </div>
    </div>` : ""}

    ${state.agentValidated.length ? `
    <div class="section-title" style="margin-top:20px">✓ Briefs validés (${state.agentValidated.length})</div>
    ${state.agentValidated.map((b,i)=>`<div class="card-bg" style="margin-bottom:8px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:6px">
        <span style="font-weight:600;color:var(--text1)">${b.contenu}</span>
        <span style="color:var(--text3)">${b.date}</span>
      </div>
      <div style="font-size:11px;color:var(--purple);margin-bottom:6px">${styles.find(s=>s[0]===b.style)[1]}</div>
      <div style="font-size:12px;color:var(--text2);line-height:1.5;white-space:pre-wrap;max-height:80px;overflow:hidden">${b.brief.slice(0,200)}…</div>
    </div>`).join("")}` : ""}`;
},

calendrier: () => `
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div style="font-size:14px;font-weight:700">Mai 2026</div>
    <div style="font-size:11px;color:var(--text3)">Objectif : 3 posts/semaine</div>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px">
    ${["Lun","Mar","Mer","Jeu","Ven","Sam","Dim"].map(d=>`<div style="font-size:11px;color:var(--text3);text-align:center;padding:3px 0">${d}</div>`).join("")}
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">
    ${[...Array(3)].map((_,i)=>`<div key="e${i}"></div>`).join("")}
    ${[...Array(31)].map((_,i)=>{
      const d = i+1;
      const plan = {19:{l:"Aujourd'hui",c:"#378ADD"},25:{l:"Dim 18h",c:"#1D9E75"},26:{l:"Lun 18h",c:"#1D9E75"},29:{l:"Reel",c:"#D4537E"}};
      const p = plan[d];
      const today = d===19;
      return `<div style="border-radius:6px;padding:4px 3px;min-height:44px;background:${today?"#E6F1FB":p?"var(--bg2)":"transparent"};border:0.5px solid ${today?"var(--blue)":"var(--border)"}">
        <div style="font-size:11px;color:${today?"var(--blue)":"var(--text2)"};text-align:center;font-weight:${today?700:400}">${d}</div>
        ${p?`<div style="font-size:8px;color:${p.c};text-align:center;margin-top:2px;line-height:1.2">${p.l}</div>`:""}
      </div>`;}).join("")}
  </div>
  <div class="insight-green" style="margin-top:14px">
    <strong>Rappel :</strong> Meilleurs jours = Dimanche & Lundi · Heure = 18h–21h · Décaler vos publications de 16h45 à 18h pour maximiser la portée.
  </div>`,

};

// ── INIT ──────────────────────────────────────────────────────────────────
render();

// Auto-refresh profil via API
(async () => {
  try {
    const d = await fetchIG("profile");
    if (d.followers_count) {
      STATIC.followers = d.followers_count;
      document.getElementById("follower-badge").textContent = fmt(d.followers_count) + " abn.";
    }
  } catch(e) {}
})();
</script>
</body>
</html>
